name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build Ionic app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build AAB
        run: cd android && ./gradlew bundleRelease

      - name: Rename AAB
        run: mv android/app/build/outputs/bundle/release/app-release.aab android/app/build/outputs/bundle/release/VechlineConfigurator.aab

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: VechlineConfigurator
          path: android/app/build/outputs/bundle/release/VechlineConfigurator.aab

      - name: Sign AAB
        run: |
          echo "" | base64 -d > android/app/vechlineconfigurator.jks
          cd android && ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/vechlineconfigurator.jks \
            -Pandroid.injected.signing.store.password=EACMC2026 \
            -Pandroid.injected.signing.key.alias=vechlineconfigurator \
            -Pandroid.injected.signing.key.password=EACMC2026
      # Fin Signature de l'App pour Google Play Store