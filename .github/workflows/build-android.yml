name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build Ionic app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build AAB
        run: cd android && ./gradlew bundleRelease

      - name: Rename AAB
        run: mv android/app/build/outputs/bundle/release/app-release.aab android/app/build/outputs/bundle/release/VechlineConfigurator.aab

      - name: Upload AAB
        uses: actions/upload-artifact@v3
        with:
          name: VechlineConfigurator
          path: android/app/build/outputs/bundle/release/VechlineConfigurator.aab